<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADAPTED 75 — Self-Improvement Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#14181C; --panel:#1B2026; --panel-2:#20262D; --line:#2A3038;
    --text:#EDEAE2; --dim:#8B9199;
    --amber:#E8A33D; --amber-dim:#8A6428;
    --sage:#6FA287; --sage-dim:#3D5548;
    --red:#C0685C; --empty:#252B32;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding:20px 14px 60px;}
  .wrap{max-width:760px; margin:0 auto;}
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2.5px; color:var(--amber); text-transform:uppercase; margin-bottom:6px;}
  h1{font-family:'Oswald',sans-serif; font-weight:700; font-size:32px; letter-spacing:1px; text-transform:uppercase; line-height:1;}
  .sub{color:var(--dim); font-size:12px; margin-top:8px; max-width:480px; line-height:1.5;}

  .sync-row{
    display:flex; align-items:center; gap:6px; margin-top:12px;
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim);
  }
  .sync-dot{width:7px; height:7px; border-radius:50%; background:var(--sage); flex-shrink:0;}
  .sync-dot.bad{background:var(--red);}
  .sync-sep{opacity:0.4;}
  .sync-edit{background:none; border:none; color:var(--amber); font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; text-decoration:underline; padding:0;}
  .start-date-row{
    display:none; gap:8px; margin-top:8px;
  }
  .start-date-row.show{display:flex;}
  .start-date-row input{flex:1;}
  .start-date-row .btn{flex-shrink:0;}
  .export-fallback{display:none; margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:10px; min-height:120px;}
  .export-fallback.show{display:block;}

  /* Tabs */
  .tabs{display:flex; gap:4px; margin-top:20px; overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch;}
  .tab{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.5px; text-transform:uppercase;
    padding:9px 13px; background:var(--panel); border:1px solid var(--line); color:var(--dim);
    cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  .tab.active{border-color:var(--amber); color:var(--amber); background:var(--panel-2);}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:16px;}
  .stat{background:var(--panel); border:1px solid var(--line); padding:12px 10px;}
  .stat .num{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--amber);}
  .stat .lbl{font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin-top:3px;}

  .section-head{display:flex; align-items:baseline; gap:10px; margin:26px 0 12px;}
  .section-head .n{font-family:'JetBrains Mono',monospace; color:var(--amber); font-size:12px;}
  .section-head h2{font-family:'Oswald',sans-serif; font-size:15px; letter-spacing:1.5px; text-transform:uppercase; font-weight:600;}
  .section-head .line{flex:1; height:1px; background:var(--line);}

  .panel{background:var(--panel); border:1px solid var(--line); padding:14px;}
  .panel.accent{border-left:3px solid var(--amber);}

  .check-row{display:flex; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none;}
  .check-row:last-child{border-bottom:none;}
  .box{width:19px; height:19px; border:2px solid var(--dim); flex-shrink:0; position:relative; transition:all .15s ease;}
  .box.on{background:var(--sage); border-color:var(--sage);}
  .box.on::after{content:''; position:absolute; left:4px; top:0px; width:5px; height:9px; border-right:2px solid var(--bg); border-bottom:2px solid var(--bg); transform:rotate(45deg);}
  .check-label{font-size:13.5px;}
  .check-label .k{display:block; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--dim); text-transform:uppercase; margin-top:1px;}
  .today-date{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dim); margin-bottom:12px;}
  .today-progress{margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dim); text-align:right;}
  .today-progress b{color:var(--amber);}

  .grid{display:grid; grid-template-columns:repeat(15,1fr); gap:4px;}
  .cell{aspect-ratio:1; background:var(--empty); cursor:pointer; position:relative; transition:transform .1s ease;}
  .cell:hover{transform:scale(1.15);}
  .cell.future{background:transparent; border:1px dashed var(--line); cursor:default;}
  .cell.future:hover{transform:none;}
  .cell.today{outline:2px solid var(--amber); outline-offset:1px;}
  .cell[data-c="1"]{background:var(--amber-dim);}
  .cell[data-c="2"]{background:var(--amber);}
  .cell[data-c="3"]{background:var(--sage-dim);}
  .cell[data-c="4"]{background:var(--sage);}
  .cell[data-c="5"]{background:var(--sage); box-shadow:0 0 0 1px var(--sage) inset;}
  .legend{display:flex; align-items:center; gap:6px; margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); flex-wrap:wrap;}
  .legend .sw{width:12px; height:12px;}

  .day-detail{margin-top:14px; padding-top:14px; border-top:1px solid var(--line);}
  .day-detail-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .day-detail-head span{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--amber);}
  .day-detail-head button{background:none; border:none; color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer;}

  .week-select{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
  .week-chip{font-family:'JetBrains Mono',monospace; font-size:11px; padding:6px 10px; background:var(--panel-2); border:1px solid var(--line); color:var(--dim); cursor:pointer;}
  .week-chip.active{border-color:var(--amber); color:var(--amber);}

  textarea, input[type=text], input[type=number], input[type=date], select{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    font-family:'Inter',sans-serif; font-size:13px; padding:10px;
  }
  textarea{min-height:70px; resize:vertical;}
  textarea:focus, input:focus, select:focus{outline:1px solid var(--amber);}
  .form-row{display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .form-row > *{flex:1; min-width:100px;}
  .btn{
    background:var(--amber); color:var(--bg); border:none; font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:9px 16px; cursor:pointer; font-weight:700;
  }
  .btn:active{transform:scale(.97);}
  .btn.ghost{background:none; border:1px solid var(--line); color:var(--dim);}
  .btn.danger{background:var(--red); color:var(--bg);}
  .saved-note{font-size:10px; color:var(--sage); margin-left:10px; font-family:'JetBrains Mono',monospace; opacity:0; transition:opacity .3s;}
  .saved-note.show{opacity:1;}

  .list-item{display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line);}
  .list-item:last-child{border-bottom:none;}
  .list-item .main{flex:1; font-size:13px;}
  .list-item .meta{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); margin-top:2px;}
  .list-item .amt{font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700;}
  .amt.pos{color:var(--sage);} .amt.neg{color:var(--red);}
  .del-btn{background:none; border:none; color:var(--dim); font-size:16px; cursor:pointer; padding:2px 6px;}
  .tag{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.5px; text-transform:uppercase; padding:3px 7px; border:1px solid var(--line);}
  .tag.contacted{color:var(--dim);}
  .tag.replied{color:var(--amber); border-color:var(--amber);}
  .tag.won{color:var(--sage); border-color:var(--sage);}
  .tag.lost{color:var(--red); border-color:var(--red);}
  .todo-done{text-decoration:line-through; color:var(--dim);}
  .empty-state{color:var(--dim); font-size:12px; text-align:center; padding:20px 0; font-family:'JetBrains Mono',monospace;}

  .protocol{background:var(--panel-2); border:1px solid var(--line); border-left:3px solid var(--dim); padding:12px 14px; font-size:12px; color:var(--dim); line-height:1.6; margin-top:14px;}
  .protocol b{color:var(--text);}
  .loading{text-align:center; color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:12px; padding:40px 0;}

  @media (max-width:480px){
    h1{font-size:26px;}
    .grid{grid-template-columns:repeat(10,1fr);}
    .stat .num{font-size:18px;}
  }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">loading log…</div></div>

<script>
const CHECKS = [
  {key:'movement', label:'Movement session complete', sub:'workout as scheduled'},
  {key:'calories', label:'Calories logged', sub:'the highest-risk variable'},
  {key:'freelance', label:'One freelance action taken', sub:'outreach, content, or client work'},
  {key:'phone', label:'Phone out of the bedroom', sub:'already your strength — keep it'},
  {key:'reading', label:'10 min reading / learning', sub:'copywriting or business craft'}
];
const TOTAL_DAYS = 75;
const TABS = [
  {id:'today', label:'Today'},
  {id:'journal', label:'Journal'},
  {id:'workout', label:'Workout'},
  {id:'freelance', label:'Freelance'},
  {id:'finances', label:'Finances'},
  {id:'tasks', label:'Tasks'}
];

let meta=null, days={}, weeklyReviews={}, journal={}, workouts=[], pipeline=[], ledger=[], todos=[];
let selectedDay=null, selectedWeek=null, activeTab='today';
let storageOk = true;
let lastSaved = null;
const STORAGE_PREFIX = 'adapted75_';
const usingLocalFallback = !(window.storage && typeof window.storage.get === 'function');

function dateKey(d){ return d.toISOString().slice(0,10); }
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtMoney(n){ return '£' + Number(n).toFixed(2); }

function dayNumberFor(dateStr){
  const start = new Date(meta.startDate + 'T00:00:00');
  const d = new Date(dateStr + 'T00:00:00');
  return Math.round((d - start) / 86400000) + 1;
}
function dateForDayNumber(n){
  const start = new Date(meta.startDate + 'T00:00:00');
  const d = new Date(start); d.setDate(d.getDate() + (n-1));
  return dateKey(d);
}
function currentDayNumber(){ return dayNumberFor(dateKey(todayDate())); }

async function safeGet(key, fallback){
  if(usingLocalFallback){
    try{
      const raw = localStorage.getItem(STORAGE_PREFIX + key);
      return raw !== null ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  try{ const r = await window.storage.get(key); return r ? JSON.parse(r.value) : fallback; }
  catch(e){ return fallback; }
}
async function safeSet(key, val){
  if(usingLocalFallback){
    try{
      localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(val));
      storageOk = true; lastSaved = new Date();
    }catch(e){ storageOk = false; }
    return;
  }
  try{
    await window.storage.set(key, JSON.stringify(val));
    storageOk = true;
    lastSaved = new Date();
  }catch(e){
    storageOk = false;
  }
}

async function loadAll(){
  meta = await safeGet('meta', null);
  if(!meta){
    meta = { startDate: '2026-07-04' };
    await safeSet('meta', meta);
  }
  days = await safeGet('days', {});
  weeklyReviews = await safeGet('weeklyReviews', {});
  journal = await safeGet('journal', {});
  workouts = await safeGet('workouts', []);
  pipeline = await safeGet('pipeline', []);
  ledger = await safeGet('ledger', []);
  todos = await safeGet('todos', []);
  render();
}

setTimeout(() => {
  const app = document.getElementById('app');
  if(app && app.querySelector('.loading')){
    if(!meta) meta = { startDate: dateKey(todayDate()) };
    render();
  }
}, 3000);

/* ---------- Today / day helpers ---------- */
function getDay(n){
  const k=String(n);
  if(!days[k]) days[k] = { date: dateForDayNumber(n), checks:{} };
  return days[k];
}
function completionCount(n){
  const day = days[String(n)];
  return day ? CHECKS.filter(c=>day.checks[c.key]).length : 0;
}
function overallStats(){
  const curr = currentDayNumber();
  const upTo = Math.min(curr, TOTAL_DAYS);
  let total=0, possible=0;
  for(let i=1;i<=upTo;i++){ total+=completionCount(i); possible+=5; }
  return { curr, pct: possible ? Math.round((total/possible)*100) : 0 };
}
function weekNumberFor(n){ return Math.ceil(n/7); }

function toggleCheck(n,key){ const day=getDay(n); day.checks[key]=!day.checks[key]; safeSet('days',days); render(); }
function selectDay(n){ selectedDay = (selectedDay===n)?null:n; render(); }
function selectWeek(w){ selectedWeek=w; render(); }
async function saveWeekNote(w){
  const ta=document.getElementById('week-note-input');
  weeklyReviews[String(w)]=ta.value;
  await safeSet('weeklyReviews',weeklyReviews);
  const note=document.getElementById('week-saved-note');
  note.classList.add('show'); setTimeout(()=>note.classList.remove('show'),1500);
}

/* ---------- Journal ---------- */
async function saveJournal(){
  const curr = Math.min(currentDayNumber(), TOTAL_DAYS);
  const ta = document.getElementById('journal-input');
  journal[String(curr)] = { date: getDay(curr).date, text: ta.value };
  await safeSet('journal', journal);
  render();
}

/* ---------- Workout ---------- */
async function addWorkoutEntry(){
  const ex = document.getElementById('w-exercise').value.trim();
  const detail = document.getElementById('w-detail').value.trim();
  if(!ex) return;
  const curr = Math.min(currentDayNumber(), TOTAL_DAYS);
  workouts.push({ id:uid(), day:curr, date:getDay(curr).date, exercise:ex, detail });
  await safeSet('workouts', workouts);
  document.getElementById('w-exercise').value=''; document.getElementById('w-detail').value='';
  render();
}
async function delWorkout(id){ workouts = workouts.filter(w=>w.id!==id); await safeSet('workouts',workouts); render(); }

/* ---------- Freelance pipeline ---------- */
async function addPipelineEntry(){
  const client = document.getElementById('p-client').value.trim();
  const notes = document.getElementById('p-notes').value.trim();
  if(!client) return;
  pipeline.push({ id:uid(), client, status:'contacted', date:dateKey(todayDate()), notes });
  await safeSet('pipeline', pipeline);
  document.getElementById('p-client').value=''; document.getElementById('p-notes').value='';
  render();
}
async function cyclePipelineStatus(id){
  const order = ['contacted','replied','won','lost'];
  const item = pipeline.find(p=>p.id===id);
  item.status = order[(order.indexOf(item.status)+1)%order.length];
  await safeSet('pipeline', pipeline); render();
}
async function delPipeline(id){ pipeline = pipeline.filter(p=>p.id!==id); await safeSet('pipeline',pipeline); render(); }

/* ---------- Finances ---------- */
async function addLedgerEntry(){
  const amt = parseFloat(document.getElementById('l-amount').value);
  const note = document.getElementById('l-note').value.trim();
  const type = document.getElementById('l-type').value;
  if(!amt || isNaN(amt)) return;
  ledger.push({ id:uid(), date:dateKey(todayDate()), amount:Math.abs(amt), type, note });
  await safeSet('ledger', ledger);
  document.getElementById('l-amount').value=''; document.getElementById('l-note').value='';
  render();
}
async function delLedger(id){ ledger = ledger.filter(l=>l.id!==id); await safeSet('ledger',ledger); render(); }
function ledgerTotals(){
  const income = ledger.filter(l=>l.type==='income').reduce((s,l)=>s+l.amount,0);
  const expense = ledger.filter(l=>l.type==='expense').reduce((s,l)=>s+l.amount,0);
  return { income, expense, net: income-expense };
}

/* ---------- Tasks ---------- */
async function addTodo(){
  const input = document.getElementById('t-input');
  const text = input.value.trim();
  if(!text) return;
  todos.push({ id:uid(), text, done:false, created:dateKey(todayDate()) });
  await safeSet('todos', todos);
  input.value=''; render();
}
async function toggleTodo(id){ const t=todos.find(t=>t.id===id); t.done=!t.done; await safeSet('todos',todos); render(); }
async function delTodo(id){ todos = todos.filter(t=>t.id!==id); await safeSet('todos',todos); render(); }

function setTab(id){ activeTab=id; selectedDay=null; render(); }

async function exportData(){
  const bundle = { meta, days, weeklyReviews, journal, workouts, pipeline, ledger, todos, exportedAt: new Date().toISOString() };
  const text = JSON.stringify(bundle, null, 2);
  const badge = document.getElementById('export-status');
  try{
    await navigator.clipboard.writeText(text);
    if(badge){ badge.textContent = 'Copied ✓'; badge.classList.add('show'); setTimeout(()=>badge.classList.remove('show'), 2000); }
  }catch(e){
    // Clipboard blocked — fall back to a selectable textarea so it can be copied manually
    const ta = document.getElementById('export-fallback');
    ta.value = text;
    ta.classList.add('show');
    ta.select();
    if(badge){ badge.textContent = 'Select & copy below'; badge.classList.add('show'); }
  }
}

async function saveStartDate(){
  const input = document.getElementById('start-date-input');
  if(!input.value) return;
  meta.startDate = input.value;
  await safeSet('meta', meta);
  render();
}

/* ---------- Render ---------- */
function render(){
  const app = document.getElementById('app');
  const { curr, pct } = overallStats();
  const clampedCurr = Math.max(1, Math.min(curr, TOTAL_DAYS));
  const todayComplete = completionCount(clampedCurr);

  const tabsHtml = TABS.map(t=>`<div class="tab ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</div>`).join('');

  let body = '';
  if(activeTab==='today') body = renderToday(clampedCurr, todayComplete);
  else if(activeTab==='journal') body = renderJournal(clampedCurr);
  else if(activeTab==='workout') body = renderWorkout(clampedCurr);
  else if(activeTab==='freelance') body = renderFreelance();
  else if(activeTab==='finances') body = renderFinances();
  else if(activeTab==='tasks') body = renderTasks();

  app.innerHTML = `
    <div class="eyebrow">STRUCTURE OVER SUFFERING</div>
    <h1>Adapted 75</h1>
    <div class="sub">Day ${clampedCurr} of 75. No restarts — miss a box, you lose the box, not the run.</div>
    <div class="sync-row">
      <span class="sync-dot ${storageOk ? 'ok':'bad'}"></span>
      <span class="sync-text">${storageOk ? (lastSaved ? 'Saved '+lastSaved.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+(usingLocalFallback?' (this browser)':'') : (usingLocalFallback ? 'Local browser storage' : 'Synced')) : 'Not saving — check connection'}</span>
      <span class="sync-sep">·</span>
      <span class="sync-text">Start: ${meta.startDate}</span>
      <button class="sync-edit" onclick="document.getElementById('start-date-row').classList.toggle('show')">edit</button>
      <span class="sync-sep">·</span>
      <button class="sync-edit" onclick="exportData()">export</button>
      <span class="saved-note" id="export-status">Copied ✓</span>
    </div>
    <textarea id="export-fallback" class="export-fallback" readonly></textarea>
    <div class="start-date-row" id="start-date-row">
      <input type="date" id="start-date-input" value="${meta.startDate}">
      <button class="btn" onclick="saveStartDate()">Set</button>
    </div>
    <div class="tabs">${tabsHtml}</div>
    <div class="stats">
      <div class="stat"><div class="num">${clampedCurr}/75</div><div class="lbl">Day</div></div>
      <div class="stat"><div class="num">${pct}%</div><div class="lbl">Completion</div></div>
      <div class="stat"><div class="num">${todayComplete}/5</div><div class="lbl">Today</div></div>
    </div>
    ${body}
  `;
}

function renderToday(clampedCurr, todayComplete){
  const checkRowsHtml = CHECKS.map(c=>{
    const day = getDay(clampedCurr);
    const on = !!day.checks[c.key];
    return `<div class="check-row" onclick="toggleCheck(${clampedCurr}, '${c.key}')">
      <div class="box ${on?'on':''}"></div>
      <div class="check-label">${c.label}<span class="k">${c.sub}</span></div>
    </div>`;
  }).join('');

  let gridHtml = '';
  const curr = currentDayNumber();
  for(let i=1;i<=TOTAL_DAYS;i++){
    const isFuture = i > curr;
    const c = completionCount(i);
    const isToday = i === curr;
    gridHtml += `<div class="cell ${isFuture?'future':''} ${isToday?'today':''}" data-c="${isFuture?'':c}" onclick="${isFuture?'':`selectDay(${i})`}" title="Day ${i}"></div>`;
  }

  let detailHtml = '';
  if(selectedDay){
    const day = getDay(selectedDay);
    const rows = CHECKS.map(c=>{
      const on = !!day.checks[c.key];
      return `<div class="check-row" onclick="toggleCheck(${selectedDay}, '${c.key}')">
        <div class="box ${on?'on':''}"></div><div class="check-label">${c.label}</div>
      </div>`;
    }).join('');
    detailHtml = `<div class="day-detail">
      <div class="day-detail-head"><span>DAY ${selectedDay} — ${day.date}</span><button onclick="selectDay(${selectedDay})">CLOSE ✕</button></div>
      ${rows}
    </div>`;
  }

  const totalWeeks = Math.ceil(TOTAL_DAYS/7);
  if(selectedWeek===null) selectedWeek = Math.min(weekNumberFor(clampedCurr), totalWeeks);
  let weekChips=''; for(let w=1;w<=totalWeeks;w++) weekChips += `<div class="week-chip ${w===selectedWeek?'active':''}" onclick="selectWeek(${w})">WK ${w}</div>`;
  const weekNoteVal = weeklyReviews[String(selectedWeek)] || '';

  return `
    <div class="section-head"><span class="n">01</span><h2>Today's Non-Negotiables</h2><div class="line"></div></div>
    <div class="panel accent">
      <div class="today-date">${getDay(clampedCurr).date}</div>
      ${checkRowsHtml}
      <div class="today-progress"><b>${todayComplete}/5</b> complete</div>
    </div>

    <div class="section-head"><span class="n">02</span><h2>75-Day Log</h2><div class="line"></div></div>
    <div class="panel">
      <div class="grid">${gridHtml}</div>
      <div class="legend">
        <div class="sw" style="background:var(--empty)"></div><span>0</span>
        <div class="sw" style="background:var(--amber-dim)"></div><span>1</span>
        <div class="sw" style="background:var(--amber)"></div><span>2</span>
        <div class="sw" style="background:var(--sage-dim)"></div><span>3</span>
        <div class="sw" style="background:var(--sage)"></div><span>4–5</span>
        <span style="margin-left:auto">tap a day to edit</span>
      </div>
      ${detailHtml}
    </div>

    <div class="section-head"><span class="n">03</span><h2>Weekly Review</h2><div class="line"></div></div>
    <div class="panel">
      <div class="week-select">${weekChips}</div>
      <textarea id="week-note-input" placeholder="Completion % this week, one pattern you noticed, one adjustment for next week.">${weekNoteVal}</textarea>
      <button class="btn" onclick="saveWeekNote(${selectedWeek})">Save review</button>
      <span class="saved-note" id="week-saved-note">saved</span>
    </div>

    <div class="protocol"><b>Bad-day protocol:</b> miss 3+ boxes, tomorrow you do the minimum viable version — a short walk, log calories even if imperfect, one DM sent. Don't skip. Don't restart. Show up smaller.</div>
  `;
}

function renderJournal(clampedCurr){
  const currVal = journal[String(clampedCurr)] ? journal[String(clampedCurr)].text : '';
  const entries = Object.keys(journal).map(Number).sort((a,b)=>b-a)
    .filter(n=>n!==clampedCurr)
    .map(n => `<div class="list-item"><div class="main">${journal[n].text || '<span style="color:var(--dim)">— no entry —</span>'}<div class="meta">Day ${n} · ${journal[n].date}</div></div></div>`).join('');

  return `
    <div class="section-head"><span class="n">·</span><h2>Today's Entry</h2><div class="line"></div></div>
    <div class="panel accent">
      <textarea id="journal-input" placeholder="What did you actually do today to improve yourself? Be specific.">${currVal}</textarea>
      <button class="btn" style="margin-top:8px" onclick="saveJournal()">Save entry</button>
    </div>
    <div class="section-head"><span class="n">·</span><h2>Past Entries</h2><div class="line"></div></div>
    <div class="panel">${entries || '<div class="empty-state">no past entries yet</div>'}</div>
  `;
}

function renderWorkout(clampedCurr){
  const todays = workouts.filter(w=>w.day===clampedCurr);
  const todayRows = todays.map(w=>`<div class="list-item">
      <div class="main">${w.exercise}<div class="meta">${w.detail||''}</div></div>
      <button class="del-btn" onclick="delWorkout('${w.id}')">✕</button>
    </div>`).join('');

  const byDay = {};
  workouts.forEach(w=>{ (byDay[w.day]=byDay[w.day]||[]).push(w); });
  const pastDays = Object.keys(byDay).map(Number).sort((a,b)=>b-a).filter(d=>d!==clampedCurr);
  const pastHtml = pastDays.map(d=>{
    const items = byDay[d].map(w=>`${w.exercise}${w.detail?' — '+w.detail:''}`).join(', ');
    return `<div class="list-item"><div class="main">${items}<div class="meta">Day ${d} · ${byDay[d][0].date}</div></div></div>`;
  }).join('');

  return `
    <div class="section-head"><span class="n">·</span><h2>Log Today's Session</h2><div class="line"></div></div>
    <div class="panel accent">
      <div class="form-row">
        <input type="text" id="w-exercise" placeholder="Exercise (e.g. Push-ups)">
        <input type="text" id="w-detail" placeholder="Sets/reps or duration (e.g. 3x15)">
      </div>
      <button class="btn" onclick="addWorkoutEntry()">Add</button>
    </div>
    <div class="section-head"><span class="n">·</span><h2>Today (Day ${clampedCurr})</h2><div class="line"></div></div>
    <div class="panel">${todayRows || '<div class="empty-state">nothing logged yet today</div>'}</div>
    <div class="section-head"><span class="n">·</span><h2>Past Sessions</h2><div class="line"></div></div>
    <div class="panel">${pastHtml || '<div class="empty-state">no past sessions yet</div>'}</div>
  `;
}

function renderFreelance(){
  const counts = {contacted:0,replied:0,won:0,lost:0};
  pipeline.forEach(p=>counts[p.status]++);
  const rows = pipeline.slice().reverse().map(p=>`
    <div class="list-item">
      <div class="main">${p.client}<div class="meta">${p.date}${p.notes?' · '+p.notes:''}</div></div>
      <span class="tag ${p.status}" style="cursor:pointer" onclick="cyclePipelineStatus('${p.id}')">${p.status}</span>
      <button class="del-btn" onclick="delPipeline('${p.id}')">✕</button>
    </div>`).join('');

  return `
    <div class="section-head"><span class="n">·</span><h2>Add Prospect</h2><div class="line"></div></div>
    <div class="panel accent">
      <div class="form-row">
        <input type="text" id="p-client" placeholder="Client / brand name">
      </div>
      <div class="form-row">
        <input type="text" id="p-notes" placeholder="Notes (optional)">
      </div>
      <button class="btn" onclick="addPipelineEntry()">Add to pipeline</button>
    </div>
    <div class="stats" style="margin-top:16px">
      <div class="stat"><div class="num">${counts.contacted}</div><div class="lbl">Contacted</div></div>
      <div class="stat"><div class="num">${counts.replied}</div><div class="lbl">Replied</div></div>
      <div class="stat"><div class="num">${counts.won}</div><div class="lbl">Won</div></div>
    </div>
    <div class="section-head"><span class="n">·</span><h2>Pipeline</h2><div class="line"></div></div>
    <div class="panel">${rows || '<div class="empty-state">no prospects yet — tap a status tag to cycle it</div>'}</div>
  `;
}

function renderFinances(){
  const { income, expense, net } = ledgerTotals();
  const rows = ledger.slice().reverse().map(l=>`
    <div class="list-item">
      <div class="main">${l.note || (l.type==='income'?'Income':'Expense')}<div class="meta">${l.date}</div></div>
      <div class="amt ${l.type==='income'?'pos':'neg'}">${l.type==='income'?'+':'−'}${fmtMoney(l.amount)}</div>
      <button class="del-btn" onclick="delLedger('${l.id}')">✕</button>
    </div>`).join('');

  return `
    <div class="section-head"><span class="n">·</span><h2>Add Entry</h2><div class="line"></div></div>
    <div class="panel accent">
      <div class="form-row">
        <select id="l-type"><option value="income">Income</option><option value="expense">Expense</option></select>
        <input type="number" id="l-amount" placeholder="Amount (£)" step="0.01">
      </div>
      <div class="form-row"><input type="text" id="l-note" placeholder="Note (e.g. Client X — email flow)"></div>
      <button class="btn" onclick="addLedgerEntry()">Add entry</button>
    </div>
    <div class="stats" style="margin-top:16px">
      <div class="stat"><div class="num">${fmtMoney(income)}</div><div class="lbl">Income</div></div>
      <div class="stat"><div class="num">${fmtMoney(expense)}</div><div class="lbl">Expenses</div></div>
      <div class="stat"><div class="num" style="color:${net>=0?'var(--sage)':'var(--red)'}">${fmtMoney(net)}</div><div class="lbl">Net</div></div>
    </div>
    <div class="section-head"><span class="n">·</span><h2>Ledger</h2><div class="line"></div></div>
    <div class="panel">${rows || '<div class="empty-state">no entries yet</div>'}</div>
  `;
}

function renderTasks(){
  const open = todos.filter(t=>!t.done);
  const done = todos.filter(t=>t.done);
  const rowHtml = t => `
    <div class="list-item">
      <div class="box ${t.done?'on':''}" onclick="toggleTodo('${t.id}')" style="cursor:pointer"></div>
      <div class="main ${t.done?'todo-done':''}">${t.text}</div>
      <button class="del-btn" onclick="delTodo('${t.id}')">✕</button>
    </div>`;

  return `
    <div class="section-head"><span class="n">·</span><h2>Add Task</h2><div class="line"></div></div>
    <div class="panel accent">
      <div class="form-row"><input type="text" id="t-input" placeholder="What needs doing?" onkeydown="if(event.key==='Enter')addTodo()"></div>
      <button class="btn" onclick="addTodo()">Add task</button>
    </div>
    <div class="section-head"><span class="n">·</span><h2>Open (${open.length})</h2><div class="line"></div></div>
    <div class="panel">${open.map(rowHtml).join('') || '<div class="empty-state">nothing open — clean slate</div>'}</div>
    ${done.length ? `<div class="section-head"><span class="n">·</span><h2>Done (${done.length})</h2><div class="line"></div></div>
    <div class="panel">${done.map(rowHtml).join('')}</div>` : ''}
  `;
}

loadAll();
</script>
</body>
</html>
